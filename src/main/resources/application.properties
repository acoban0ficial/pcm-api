spring.application.name=pcm-api
application.title=Project & Client Managenement API
application.version=0.1.1

--PARAMETROS PARA CONEXION A BASE DE DATOS POSTGRESQL
spring.datasource.url=jdbc:postgresql://localhost:5432/pcm_db
spring.datasource.username=pcm_user
spring.datasource.password=pcm_password
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=pcm_schema


